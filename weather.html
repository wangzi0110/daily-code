<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西安天气卡片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 20px;
        }
        /* 卡片容器 */
        .card-container {
            perspective: 1800px;
            width: 100%;
            max-width: 380px;
            cursor: pointer;
        }
        .flip-card {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 4;
            transition: transform 0.65s ease;
            transform-style: preserve-3d;
            border-radius: 48px;
        }
        .flip-card.flipped {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 48px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.35);
        }
        .card-front {
            transform: rotateY(0deg);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 28px 22px 30px 22px;
            color: #fff;
        }
        .card-back {
            background: rgba(30, 35, 45, 0.45);
            transform: rotateY(180deg);
            padding: 28px 24px 32px 24px;
            color: #fefefe;
        }
        .city-name {
            font-size: 2.3rem;
            font-weight: 600;
            background: linear-gradient(135deg, #FFFFFF, #FFEFCF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .temp-big {
            font-size: 4.6rem;
            font-weight: 700;
            text-align: center;
            color: white;
        }
        .temp-unit {
            font-size: 1.9rem;
        }
        .condition-text {
            font-size: 1.35rem;
            text-align: center;
            background: rgba(255,248,235,0.25);
            padding: 6px 20px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 14px;
        }
        .front-footer {
            display: flex;
            justify-content: space-between;
            border-top: 0.5px solid rgba(255,255,255,0.3);
            padding-top: 18px;
            font-size: 0.85rem;
        }
        .hint {
            background: rgba(0,0,0,0.2);
            padding: 6px 14px;
            border-radius: 40px;
        }
        .tap-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.7rem;
            color: white;
            pointer-events: none;
        }
        .back-title {
            font-size: 1.7rem;
            font-weight: 600;
            border-left: 4px solid #FFD966;
            padding-left: 14px;
            margin-bottom: 20px;
        }
        .details-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .detail-item {
            display: flex;
            justify-content: space-between;
            padding-bottom: 8px;
            border-bottom: 0.5px solid rgba(255,255,255,0.25);
        }
        .detail-value {
            font-weight: 620;
            font-size: 1.35rem;
            color: #FFECCC;
        }
        .back-footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 0.5px solid rgba(255,255,255,0.2);
        }
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 16px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-state {
            text-align: center;
            padding: 20px;
            color: #ffb347;
        }
        .retry-btn {
            margin-top: 12px;
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="card-container">
    <div class="flip-card" id="flipCard">
        <div class="card-front" id="cardFront">
            <div id="frontContent" style="display: flex; flex-direction: column; height: 100%;">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <div>Loading weather data...</div>
                </div>
            </div>
            <div class="tap-hint">Click to flip</div>
        </div>
        <div class="card-back" id="cardBack">
            <div id="backContent" style="display: flex; flex-direction: column; height: 100%;">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <div>Loading...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Hefeng Weather API Configuration
    const API_KEY = '0d8df58ac126426a949380cba287f26e';
    const LOCATION_ID = '101110101';
    const API_URL = 'https://n83wt3ehbm.re.qweatherapi.com/v7/weather/now';

    async function fetchWeather() {
        const url = API_URL + '?location=' + LOCATION_ID + '&key=' + API_KEY;
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.code !== '200') {
            throw new Error('API error: ' + data.code);
        }
        return data;
    }

    async function updateCard() {
        const frontDiv = document.getElementById('frontContent');
        const backDiv = document.getElementById('backContent');
        
        try {
            const weather = await fetchWeather();
            const now = weather.now;
            
            // Update front
            frontDiv.innerHTML = `
                <div>
                    <div class="city-name">Xi'an</div>
                    <div style="font-size:0.75rem; opacity:0.8; margin-top:4px;">Real-time Weather</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:5rem;">${getWeatherIcon(now.icon)}</div>
                    <div class="temp-big">${now.temp}<span class="temp-unit">°C</span></div>
                    <div class="condition-text">${now.text}</div>
                </div>
                <div class="front-footer">
                    <div class="hint">Humidity ${now.humidity}%</div>
                    <div class="hint">Wind ${now.windSpeed} km/h</div>
                </div>
            `;
            
            // Update back
            backDiv.innerHTML = `
                <div class="back-title">Weather Details</div>
                <div class="details-grid">
                    <div class="detail-item">
                        <span>Humidity</span>
                        <span class="detail-value">${now.humidity}%</span>
                    </div>
                    <div class="detail-item">
                        <span>Wind Speed</span>
                        <span class="detail-value">${now.windSpeed} km/h</span>
                    </div>
                    <div class="detail-item">
                        <span>Feels Like</span>
                        <span class="detail-value">${now.feelsLike}°C</span>
                    </div>
                    <div class="detail-item">
                        <span>Precipitation</span>
                        <span class="detail-value">${now.precip || '0'} mm</span>
                    </div>
                </div>
                <div class="back-footer">
                    <span>Powered by QWeather</span>
                </div>
            `;
            
        } catch (err) {
            console.error(err);
            frontDiv.innerHTML = `
                <div class="error-state">
                    <div>Failed to load weather</div>
                    <div style="font-size:0.8rem;">${err.message}</div>
                    <button class="retry-btn" onclick="location.reload()">Retry</button>
                </div>
            `;
            backDiv.innerHTML = `
                <div class="error-state">
                    <div>Data unavailable</div>
                    <button class="retry-btn" onclick="location.reload()">Retry</button>
                </div>
            `;
        }
    }
    
    function getWeatherIcon(code) {
        // Simple icon mapping for Hefeng weather codes
        const sunny = ['100', '101', '102', '103'];
        const cloudy = ['104', '150', '151'];
        const rainy = ['300', '301', '302', '303', '304', '305', '306', '307', '308', '309', '310', '311', '312', '313'];
        const snowy = ['400', '401', '402', '403', '404', '405', '406'];
        
        if (sunny.includes(code)) return '☀️';
        if (cloudy.includes(code)) return '☁️';
        if (rainy.includes(code)) return '🌧️';
        if (snowy.includes(code)) return '❄️';
        return '🌡️';
    }
    
    // Flip animation
    let isAnimating = false;
    const flipCard = document.getElementById('flipCard');
    
    flipCard.addEventListener('click', function() {
        if (isAnimating) return;
        isAnimating = true;
        flipCard.classList.toggle('flipped');
        setTimeout(function() { isAnimating = false; }, 650);
    });
    
    // Load data
    updateCard();
</script>
</body>
</html>
