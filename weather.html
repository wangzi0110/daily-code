<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气的心情 · 玻璃窗外</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
            /* 卡片之间间距加大 */
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            /* 允许上下滚动 */
            padding: 40px 24px;
            /* 增加内边距，给卡片呼吸空间 */
            background: #f0f0f0;
        }

        /* 动态背景 */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.8) contrast(1.1);
            pointer-events: none;
        }

        /* 后备背景色 */
        body.weather-sunny {
            background: linear-gradient(135deg, #f5f7fa 0%, #f9e79f 100%);
        }

        body.weather-cloudy {
            background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%);
        }

        body.weather-rainy {
            background: linear-gradient(135deg, #dfe9f3 0%, #4a6274 100%);
        }

        /* 动画叠加层 */
        .weather-fx {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        /* 阳光光束 */
        .sunbeam {
            position: absolute;
            top: -20%;
            right: -10%;
            width: 60%;
            height: 120%;
            background: linear-gradient(135deg, rgba(255, 255, 200, 0.25) 0%, rgba(255, 255, 200, 0.02) 80%);
            transform: rotate(15deg);
            filter: blur(20px);
            animation: sunbeam-sway 12s ease-in-out infinite alternate;
            opacity: 0;
        }

        body.weather-sunny .sunbeam {
            opacity: 1;
        }

        @keyframes sunbeam-sway {
            0% {
                transform: rotate(10deg) scale(1.05);
            }

            100% {
                transform: rotate(18deg) scale(1);
            }
        }

        /* 雨滴 */
        .rain-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
        }

        body.weather-rainy .rain-container {
            opacity: 1;
        }

        .raindrop-bg {
            position: absolute;
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.4));
            border-radius: 0 0 50% 50%;
            animation: rain-fall 1.2s linear infinite;
        }

        @keyframes rain-fall {
            0% {
                transform: translateY(-20px);
                opacity: 0;
            }

            10% {
                opacity: 0.8;
            }

            90% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(120vh);
                opacity: 0;
            }
        }

        /* 水痕 */
        .water-streak {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(255, 255, 255, 0.02) 8px, rgba(255, 255, 255, 0.04) 10px);
            opacity: 0;
        }

        body.weather-rainy .water-streak {
            opacity: 1;
        }

        /* 雾气 */
        .mist {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(200, 210, 220, 0.15), transparent);
            filter: blur(30px);
            opacity: 0;
        }

        body.weather-rainy .mist,
        body.weather-cloudy .mist {
            opacity: 0.6;
        }

        /* 卡片容器 */
        .weather-card-main {
            width: 400px;
            /* 稍微缩小，给两个卡片更多间距 */
            height: 600px;
            perspective: 1200px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
            /* 防止被压缩 */
        }

        .weather-card-main:hover {
            transform: translateY(-4px);
        }

        .weather-card-guide {
            width: 280px;
            /* 小卡片保持比例 */
            height: 420px;
            perspective: 1200px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .weather-card-guide:hover {
            transform: translateY(-4px);
        }

        /* 卡片内芯（翻转动画） */
        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-inner.flipping {
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
        }

        /* 正面通用样式（玻璃拟态精细化） */
        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow:
                0 8px 32px rgba(31, 38, 135, 0.15),
                inset 0 0 0 1px rgba(255, 255, 255, 0.15);
            padding: 32px;
            box-sizing: border-box;
            color: #fff;
        }

        /* 大卡片正面内容 */
        .main-card-front {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            /* 上下两端对齐 */
            height: 100%;
        }

        /* 城市信息（二级文字） */
        .city-info {
            align-self: flex-start;
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease 0.1s both;
        }

        /* 城市搜索样式 */
        .city-search {
            position: relative;
            margin-bottom: 12px;
            width: 100%;
        }

        .city-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .city-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .city-input:focus {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        .city-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            margin-top: 8px;
            z-index: 1000;
            display: none;
        }

        .city-results.show {
            display: block;
        }

        .city-result-item {
            padding: 10px 12px;
            cursor: pointer;
            transition: background 0.2s ease;
            color: #fff;
        }

        .city-result-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .city-name {
            font-size: 48px;
            font-weight: 500;
            line-height: 1.1;
            color: #ffffff;
        }

        .city-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 4px;
        }

        /* 温度信息（一级核心） */
        .temp-info {
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        .temp-icon {
            font-size: 80px;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
            animation: iconGlow 3s ease-in-out infinite;
        }

        .temp-value {
            font-size: 88px;
            font-weight: 700;
            line-height: 1;
            color: #ffffff;
        }

        .temp-value span {
            font-size: 48px;
            /* 缩小℃，形成对比 */
            font-weight: 500;
        }

        .weather-status {
            margin-top: 16px;
            padding: 8px 24px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            font-size: 24px;
            font-weight: 500;
            color: #ffffff;
        }

        /* 辅助信息（三级文字） */
        .extra-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeInUp 0.6s ease 0.3s both;
        }

        .info-item {
            padding: 8px 16px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.2);
            font-size: 16px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.8);
        }

        /* 小时预报样式 */
        /* 小时预报容器 */
        .hourly-forecast {
            width: 100%;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            animation: fadeInUp 0.6s ease 0.4s both;
        }

        .hourly-title {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
        }

        .hourly-list {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 4px;
            scrollbar-width: none;
            /* 隐藏滚动条，更干净 */
        }

        .hourly-list::-webkit-scrollbar {
            display: none;
        }

        .hourly-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 50px;
        }

        .hourly-time {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
        }

        .hourly-icon {
            font-size: 18px;
            margin: 4px 0;
        }

        .hourly-temp {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        /* 7天预报样式 */
        .weekly-forecast {
            margin-top: 24px;
            animation: fadeInUp 0.6s ease 0.5s both;
        }

        .forecast-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .forecast-day {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(8px);
        }

        .forecast-date {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            min-width: 60px;
        }

        .forecast-icon {
            font-size: 24px;
        }

        .forecast-temp {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
        }

        /* 图表样式 */
        .weather-chart {
            margin-top: 24px;
            animation: fadeInUp 0.6s ease 0.6s both;
        }

        .chart-container {
            position: relative;
            height: 200px;
            width: 100%;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 16px;
        }

        /* 按钮样式（统一+呼吸动画） */
        .flip-btn {
            align-self: flex-end;
            /* 靠右对齐 */
            margin-top: auto;
            /* 推到底部 */
            padding: 10px 20px;
            border-radius: 24px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .flip-btn:hover {
            background: rgba(0, 0, 0, 0.5);
            transform: scale(1.05);
            animation: none;
        }

        /* 小卡片正面内容 */
        .guide-card-front {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 24px;
        }

        .guide-text {
            font-size: 24px;
            font-weight: 600;
            line-height: 1.6;
            color: #fff;
            animation: fadeInUp 0.6s ease 0.1s both;
        }

        .guide-btn {
            padding: 10px 28px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: breathe 2s ease-in-out infinite;
        }

        .guide-btn:hover {
            background: rgba(0, 0, 0, 0.5);
            transform: scale(1.05);
            animation: none;
        }

        /* 背面诗句样式 */
        .card-back {
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: "思源宋体", serif;
            font-size: 28px;
            line-height: 1.8;
            letter-spacing: 1px;
            color: #fff;
        }

        /* 诗句动画效果 */
        .poem {
            animation: fadeIn 1.2s ease forwards;
            white-space: normal;
            overflow: visible;
            line-height: 2;
            padding: 0 10px;
        }

        .poem-icon {
            font-size: 2rem;
            margin-bottom: 20px;
            animation: iconGlow 3s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes typing {
            from {
                width: 0;
            }

            to {
                width: 100%;
            }
        }

        @keyframes iconGlow {

            0%,
            100% {
                filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
            }

            50% {
                filter: drop-shadow(0 0 16px rgba(255, 255, 255, 0.5));
            }
        }

        /* 大卡片背面 */
        .weather-card-main .card-back {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            font-size: 16px;
            line-height: 1.5;
            letter-spacing: normal;
        }

        /* 小卡片背面 */
        .weather-card-guide .card-back {
            padding: 24px;
        }

        /* 动画关键帧 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        /* 卡片浮动动画 */
        .weather-card-main,
        .weather-card-guide {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-6px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        /* 响应式适配 - 手机端优化 */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                justify-content: flex-start;
                /* 改为从顶部开始排列 */
                padding: 24px 16px;
                gap: 24px;
                overflow-y: auto;
                /* 允许上下滚动 */
            }

            .weather-card-main,
            .weather-card-guide {
                width: 100%;
                /* 占满宽度 */
                max-width: 400px;
                /* 最大宽度限制，避免太宽 */
                height: auto;
                min-height: 600px;
                margin: 0 auto;
                /* 居中 */
                flex-shrink: 0;
                /* 防止被压缩 */
            }

            /* 小卡片稍微矮一点，保持比例协调 */
            .weather-card-guide {
                min-height: 200px;
            }

            /* 字体适当缩小 */
            .city-name {
                font-size: 36px;
            }

            .temp-value {
                font-size: 64px;
            }

            .temp-value span {
                font-size: 36px;
            }

            .weather-status {
                font-size: 20px;
                padding: 6px 20px;
            }

            .guide-text {
                font-size: 20px;
            }

            /* 城市搜索适配 */
            .city-input {
                font-size: 14px;
                padding: 10px 12px;
            }

            /* 小时预报适配 */
            .hourly-forecast {
                margin-top: 20px;
            }

            .forecast-title {
                font-size: 16px;
                margin-bottom: 12px;
            }

            .hourly-container {
                gap: 12px;
            }

            .hourly-item {
                min-width: 55px;
                padding: 10px 6px;
            }

            .hourly-time {
                font-size: 12px;
            }

            .hourly-icon {
                font-size: 20px;
            }

            .hourly-temp {
                font-size: 14px;
            }

            /* 7天预报适配 */
            .weekly-forecast {
                margin-top: 20px;
            }

            .forecast-day {
                padding: 10px 12px;
            }

            .forecast-date {
                font-size: 12px;
                min-width: 50px;
            }

            .forecast-icon {
                font-size: 20px;
            }

            .forecast-temp {
                font-size: 14px;
            }

            /* 图表适配 */
            .weather-chart {
                margin-top: 20px;
            }

            .chart-container {
                height: 180px;
                padding: 12px;
            }

            /* 详细信息适配 */
            .details-grid {
                gap: 12px;
            }

            .detail-item {
                padding: 10px;
            }

            .detail-item span {
                font-size: 14px;
            }

            .detail-value {
                font-size: 14px;
            }
        }

        .back-title {
            font-size: 1.7rem;
            font-weight: 600;
            border-left: 4px solid #FFD966;
            padding-left: 14px;
            margin-bottom: 20px;
        }

        .details-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding-bottom: 8px;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.25);
        }

        .detail-value {
            font-weight: 620;
            font-size: 1.35rem;
            color: #FFECCC;
        }

        .back-footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.2);
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-state {
            text-align: center;
            padding: 20px;
            color: #ffb347;
        }

        .retry-btn {
            margin-top: 12px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <video class="video-bg" id="bgVideo" autoplay loop muted playsinline>
        <source src="videos/cloudy.mp4" type="video/mp4">
    </video>

    <div class="weather-fx">
        <div class="sunbeam"></div>
        <div class="rain-container" id="rainContainer"></div>
        <div class="water-streak"></div>
        <div class="mist"></div>
    </div>

    <!-- 小卡片 -->
    <div class="weather-card-guide">
        <div class="card-inner" id="poemCard">
            <!-- 正面 -->
            <div class="card-front guide-card-front">
                <div class="guide-text">一触即翻，<br>天气与诗皆可见</div>
                <button class="guide-btn">轻触翻面 · 遇见诗意</button>
            </div>
            <!-- 背面 -->
            <div class="card-back" id="poemCardBack">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <div>Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 主卡片 -->
    <div class="weather-card-main">
        <div class="card-inner" id="flipCard">
            <!-- 正面（天气信息） -->
            <div class="card-front main-card-front" id="cardFront">
                <div id="frontContent" style="display: flex; flex-direction: column; height: 100%;">
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <div>Loading weather...</div>
                    </div>
                </div>
                <button class="flip-btn">轻触翻面 · 遇见诗意</button>
            </div>
            <!-- 背面（天气详情） -->
            <div class="card-back" id="cardBack">
                <div id="backContent" style="display: flex; flex-direction: column; height: 100%;">
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <div>Loading...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API 配置
        const API_KEY = '0d8df58ac126426a949380cba287f26e';
        let LOCATION_ID = localStorage.getItem('selectedCityId') || '101110101';
        let currentCityName = localStorage.getItem('selectedCityName') || "Xi'an";
        const API_URL_NOW = 'https://n83wt3ehbm.re.qweatherapi.com/v7/weather/now';
        const API_URL_3D = 'https://n83wt3ehbm.re.qweatherapi.com/v7/weather/3d';
        const API_URL_24H = 'https://n83wt3ehbm.re.qweatherapi.com/v7/weather/24h';
        const API_URL_CITY = 'https://n83wt3ehbm.re.qweatherapi.com/v2/city/lookup';

        const bgVideo = document.getElementById('bgVideo');

        function setWeatherVideo(weatherType) {
            let videoFile = 'cloudy.mp4';
            if (weatherType.includes('sunny')) videoFile = 'sunny.mp4';
            else if (weatherType.includes('rainy')) videoFile = 'rainy.mp4';
            else if (weatherType.includes('cloudy')) videoFile = 'cloudy.mp4';

            const source = bgVideo.querySelector('source');
            if (source) {
                source.src = `videos/${videoFile}`;
                bgVideo.load();
                bgVideo.play().catch(e => console.log('使用CSS背景'));
            }
        }

        function getWeatherIcon(code) {
            const sunny = ['100', '101', '102', '103'];
            const cloudy = ['104', '150', '151'];
            const rainy = ['300', '301', '302', '303', '304', '305', '306', '307', '308', '309', '310', '311', '312', '313'];
            if (sunny.includes(code)) return '☀️';
            if (cloudy.includes(code)) return '☁️';
            if (rainy.includes(code)) return '🌧️';
            return '🌡️';
        }

        function generateRain() {
            const container = document.getElementById('rainContainer');
            container.innerHTML = '';
            for (let i = 0; i < 50; i++) {
                const drop = document.createElement('div');
                drop.className = 'raindrop-bg';
                drop.style.left = Math.random() * 100 + '%';
                drop.style.animationDelay = Math.random() * 2 + 's';
                drop.style.animationDuration = (1 + Math.random() * 0.8) + 's';
                container.appendChild(drop);
            }
        }

        function applyWeatherEffects(desc) {
            const body = document.body;
            body.className = '';

            const lower = desc.toLowerCase();
            let weatherType = 'cloudy';
            if (lower.includes('晴')) weatherType = 'sunny';
            else if (lower.includes('雨')) weatherType = 'rainy';
            else if (lower.includes('云') || lower.includes('阴')) weatherType = 'cloudy';

            body.classList.add(`weather-${weatherType}`);
            setWeatherVideo(weatherType);
            if (weatherType === 'rainy') generateRain();
        }

        // 添加超时函数
        function fetchWithTimeout(url, options = {}, timeout = 10000) {
            return Promise.race([
                fetch(url, options),
                new Promise((_, reject) =>
                    setTimeout(() => reject(new Error('请求超时')), timeout)
                )
            ]);
        }

        async function fetchWeather() {
            try {
                console.log('开始获取天气数据...');
                console.log('API_KEY:', API_KEY);
                console.log('LOCATION_ID:', LOCATION_ID);

                const [nowResp, forecastResp, hourlyResp] = await Promise.all([
                    fetchWithTimeout(`${API_URL_NOW}?location=${LOCATION_ID}&key=${API_KEY}`),
                    fetchWithTimeout(`${API_URL_3D}?location=${LOCATION_ID}&key=${API_KEY}`),
                    fetchWithTimeout(`${API_URL_24H}?location=${LOCATION_ID}&key=${API_KEY}`)
                ]);

                console.log('API响应状态:', nowResp.status, forecastResp.status, hourlyResp.status);

                if (!nowResp.ok || !forecastResp.ok || !hourlyResp.ok) {
                    throw new Error(`API 请求失败: ${nowResp.status} ${forecastResp.status} ${hourlyResp.status}`);
                }

                const nowData = await nowResp.json();
                const forecastData = await forecastResp.json();
                const hourlyData = await hourlyResp.json();

                console.log('API返回数据:', nowData, forecastData, hourlyData);

                if (nowData.code !== '200' || forecastData.code !== '200' || hourlyData.code !== '200') {
                    throw new Error(`API 返回错误: ${nowData.code} ${forecastData.code} ${hourlyData.code}`);
                }

                return { now: nowData.now, forecast: forecastData.daily, hourly: hourlyData.hourly };
            } catch (err) {
                console.error('获取天气数据失败:', err);
                // 返回模拟数据，确保页面能够正常显示
                return {
                    now: {
                        temp: '24',
                        text: '多云',
                        humidity: '39',
                        windSpeed: '5',
                        feelsLike: '25',
                        icon: '101'
                    },
                    forecast: [
                        { fxDate: new Date().toISOString().split('T')[0], tempMin: '18', tempMax: '26', iconDay: '101' },
                        { fxDate: new Date(Date.now() + 86400000).toISOString().split('T')[0], tempMin: '19', tempMax: '27', iconDay: '100' },
                        { fxDate: new Date(Date.now() + 172800000).toISOString().split('T')[0], tempMin: '17', tempMax: '25', iconDay: '104' },
                        { fxDate: new Date(Date.now() + 259200000).toISOString().split('T')[0], tempMin: '16', tempMax: '24', iconDay: '101' },
                        { fxDate: new Date(Date.now() + 345600000).toISOString().split('T')[0], tempMin: '18', tempMax: '26', iconDay: '100' },
                        { fxDate: new Date(Date.now() + 432000000).toISOString().split('T')[0], tempMin: '19', tempMax: '27', iconDay: '101' },
                        { fxDate: new Date(Date.now() + 518400000).toISOString().split('T')[0], tempMin: '18', tempMax: '26', iconDay: '104' }
                    ],
                    hourly: Array.from({ length: 8 }, (_, i) => {
                        const hour = new Date(Date.now() + i * 3600000);
                        return {
                            fxTime: hour.toISOString(),
                            temp: (20 + i).toString(),
                            icon: '101'
                        };
                    })
                };
            }
        }

        async function updateCard() {
            const frontDiv = document.getElementById('frontContent');
            const backDiv = document.getElementById('backContent');
            try {
                const data = await fetchWeather();
                const now = data.now;
                const forecast = data.forecast;
                const hourly = data.hourly;
                applyWeatherEffects(now.text);

                // 确定天气类型
                const lower = now.text.toLowerCase();
                let weatherType = 'cloudy';
                if (lower.includes('晴')) weatherType = 'sunny';
                else if (lower.includes('雨')) weatherType = 'rainy';
                else if (lower.includes('云') || lower.includes('阴')) weatherType = 'cloudy';

                // 更新小诗卡片
                updatePoemCard(weatherType, now.text);

                // 生成7天预报HTML
                const forecastHTML = forecast.map(day => {
                    const date = new Date(day.fxDate);
                    const dayName = date.toLocaleDateString('zh-CN', { weekday: 'short' });
                    return `
                    <div class="forecast-day">
                        <div class="forecast-date">${dayName}</div>
                        <div class="forecast-icon">${getWeatherIcon(day.iconDay)}</div>
                        <div class="forecast-temp">${day.tempMin}° / ${day.tempMax}°</div>
                    </div>
                    `;
                }).join('');

                // 生成小时预报HTML
                const hourlyHTML = hourly.slice(0, 8).map(h => {
                    // 处理ISO格式的时间字符串
                    const hour = h.fxTime.includes('T') ? h.fxTime.split('T')[1].substring(0, 5) : h.fxTime.split(' ')[1].substring(0, 5);
                    return `
                    <div class="hourly-item">
                        <div class="hourly-time">${hour}</div>
                        <div class="hourly-icon">${getWeatherIcon(h.icon)}</div>
                        <div class="hourly-temp">${h.temp}°</div>
                    </div>
                    `;
                }).join('');

                frontDiv.innerHTML = `
                <div class="city-info">
                    <div class="city-search">
                        <input type="text" id="cityInput" placeholder="搜索城市..." class="city-input">
                        <div id="cityResults" class="city-results"></div>
                    </div>
                    <div class="city-name" id="cityName">${currentCityName}</div>
                    <div class="city-desc">Real-time Weather</div>
                </div>
                <div class="temp-info">
                    <div class="temp-icon">${getWeatherIcon(now.icon)}</div>
                    <div class="temp-value">${now.temp}<span>°C</span></div>
                    <div class="weather-status">${now.text}</div>
                </div>
                <div class="extra-info">
                    <div class="info-item">Humidity ${now.humidity}%</div>
                    <div class="info-item">Wind ${now.windSpeed} km/h</div>
                </div>
                <div class="hourly-forecast">
                    <div class="hourly-title">今日小时预报</div>
                    <div class="hourly-list" id="hourlyList">
                        <!-- 动态生成小时预报 -->
                    </div>
                </div>
            `;
                // 将小时预报插入到容器中
                document.getElementById('hourlyList').innerHTML = hourlyHTML;
                backDiv.innerHTML = `
                <div class="back-title">Weather Details</div>
                <div class="details-grid">
                    <div class="detail-item"><span>High / Low</span><span class="detail-value">${forecast[0].tempMax}° / ${forecast[0].tempMin}°</span></div>
                    <div class="detail-item"><span>Humidity</span><span class="detail-value">${now.humidity}%</span></div>
                    <div class="detail-item"><span>Wind Speed</span><span class="detail-value">${now.windSpeed} km/h</span></div>
                    <div class="detail-item"><span>Feels Like</span><span class="detail-value">${now.feelsLike}°C</span></div>
                </div>
                <div class="weather-chart">
                    <h3 class="forecast-title">温度趋势</h3>
                    <div class="chart-container">
                        <canvas id="tempChart"></canvas>
                    </div>
                </div>
                <div class="weekly-forecast">
                    <h3 class="forecast-title">7天预报</h3>
                    <div class="forecast-container">
                        ${forecastHTML}
                    </div>
                </div>
                <div class="back-footer"><span>Powered by QWeather</span></div>
            `;

                // 绘制温度趋势图
                setTimeout(() => {
                    const ctx = document.getElementById('tempChart').getContext('2d');
                    const labels = forecast.map(day => {
                        const date = new Date(day.fxDate);
                        return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
                    });
                    const tempMax = forecast.map(day => parseInt(day.tempMax));
                    const tempMin = forecast.map(day => parseInt(day.tempMin));

                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [
                                {
                                    label: '最高温',
                                    data: tempMax,
                                    borderColor: 'rgba(255, 159, 64, 1)',
                                    backgroundColor: 'rgba(255, 159, 64, 0.2)',
                                    tension: 0.4,
                                    fill: false
                                },
                                {
                                    label: '最低温',
                                    data: tempMin,
                                    borderColor: 'rgba(54, 162, 235, 1)',
                                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                                    tension: 0.4,
                                    fill: false
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    labels: {
                                        color: 'rgba(255, 255, 255, 0.8)'
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    ticks: {
                                        color: 'rgba(255, 255, 255, 0.8)'
                                    },
                                    grid: {
                                        color: 'rgba(255, 255, 255, 0.1)'
                                    }
                                },
                                x: {
                                    ticks: {
                                        color: 'rgba(255, 255, 255, 0.8)'
                                    },
                                    grid: {
                                        color: 'rgba(255, 255, 255, 0.1)'
                                    }
                                }
                            }
                        }
                    });
                }, 100);
            } catch (err) {
                console.error('更新卡片失败:', err);
                frontDiv.innerHTML = `<div class="error-state"><div>Failed to load weather</div><button class="retry-btn" onclick="location.reload()">Retry</button></div>`;
                backDiv.innerHTML = `<div class="error-state"><div>Data unavailable</div><button class="retry-btn" onclick="location.reload()">Retry</button></div>`;

                // 错误时默认显示多云诗句
                updatePoemCard('cloudy', '多云');
            }
        }

        // 诗句数据
        const poems = {
            sunny: [
                '阳光正好，微风不燥',
                '人间晴朗，万物可爱',
                '今日晴，宜收集快乐',
                '风暖云轻，万事皆胜意',
                '天光恰好，岁月温柔'
            ],
            cloudy: [
                '云舒漫卷，心事缓缓',
                '日子清淡，也自有温柔',
                '阴天也浪漫，万物皆安然',
                '云藏心事，风知温柔',
                '不晴不雨，恰好安心'
            ],
            rainy: [
                '雨落心安，万事皆缓',
                '听雨落下，等风也等你',
                '雨天适合，安静想你',
                '细雨温柔，治愈所有',
                '雨打窗台，温柔自来'
            ]
        };

        // 天气图标映射表
        const weatherIconMap = {
            "晴": "☀️",
            "多云": "⛅",
            "阴": "☁️",
            "小雨": "🌧️",
            "大雨": "⛈️"
        };

        // 天气图标
        const weatherIcons = {
            sunny: '☀️',
            cloudy: '☁️',
            rainy: '🌧️'
        };

        // 根据天气状态切换图标
        function updateWeatherIcon(weatherStatus) {
            return weatherIconMap[weatherStatus] || "⛅";
        }

        // 更新小诗卡片
        function updatePoemCard(weatherType, weatherStatus) {
            const poemCardBack = document.getElementById('poemCardBack');
            const poemsList = poems[weatherType] || poems.cloudy;
            const randomPoem = poemsList[Math.floor(Math.random() * poemsList.length)];
            const icon = updateWeatherIcon(weatherStatus) || weatherIcons[weatherType] || weatherIcons.cloudy;

            poemCardBack.innerHTML = `
                <div class="poem-icon">${icon}</div>
                <div class="poem poem-text">${randomPoem}</div>
            `;
        }

        // 城市搜索功能
        function setupCitySearch() {
            // 检查元素是否存在
            const cityInput = document.getElementById('cityInput');
            const cityResults = document.getElementById('cityResults');

            if (!cityInput || !cityResults) {
                console.log('城市搜索元素未找到，稍后重试');
                // 延迟一段时间后重试
                setTimeout(setupCitySearch, 1000);
                return;
            }

            cityInput.addEventListener('input', async function (e) {
                const keyword = e.target.value.trim();
                if (keyword.length < 2) {
                    cityResults.classList.remove('show');
                    return;
                }

                try {
                    const response = await fetch(`${API_URL_CITY}?key=${API_KEY}&location=${encodeURIComponent(keyword)}`);
                    const data = await response.json();
                    if (data.code === '200' && data.location.length > 0) {
                        displayCityResults(data.location);
                    } else {
                        cityResults.classList.remove('show');
                    }
                } catch (error) {
                    console.error('城市搜索失败:', error);
                    cityResults.classList.remove('show');
                }
            });

            function displayCityResults(cities) {
                cityResults.innerHTML = '';
                cities.forEach(city => {
                    const item = document.createElement('div');
                    item.className = 'city-result-item';
                    item.textContent = `${city.name}, ${city.adm2}, ${city.adm1}`;
                    item.addEventListener('click', function () {
                        selectCity(city);
                    });
                    cityResults.appendChild(item);
                });
                cityResults.classList.add('show');
            }

            function selectCity(city) {
                LOCATION_ID = city.id;
                currentCityName = city.name;
                localStorage.setItem('selectedCityId', city.id);
                localStorage.setItem('selectedCityName', city.name);
                document.getElementById('cityName').textContent = city.name;
                cityResults.classList.remove('show');
                document.getElementById('cityInput').value = '';
                updateCard();
            }

            // 点击外部关闭搜索结果
            document.addEventListener('click', function (e) {
                if (!cityInput.contains(e.target) && !cityResults.contains(e.target)) {
                    cityResults.classList.remove('show');
                }
            });
        }

        let isAnimating = false;

        // 主卡片翻转
        document.getElementById('flipCard').addEventListener('click', function () {
            if (isAnimating) return;
            isAnimating = true;
            this.classList.add('flipping');
            this.classList.toggle('flipped');
            setTimeout(() => {
                this.classList.remove('flipping');
                isAnimating = false;
            }, 800);
        });

        // 小诗卡片翻转
        document.getElementById('poemCard').addEventListener('click', function () {
            if (isAnimating) return;
            isAnimating = true;
            this.classList.add('flipping');
            this.classList.toggle('flipped');
            setTimeout(() => {
                this.classList.remove('flipping');
                isAnimating = false;
            }, 800);
        });

        setupCitySearch();
        updateCard();
    </script>
</body>

</html>
