<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的小天气</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        
        .weather-card {
            background-color: white;
            border-radius: 15px;
            padding: 20px;
            margin: 15px;
            width: 300px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
            perspective: 1000px;
            cursor: pointer;
        }
        
        .weather-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }
        
        .weather-card.flipped .weather-card-inner {
            transform: rotateY(180deg);
        }
        
        .weather-card-front, .weather-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .weather-card-back {
            transform: rotateY(180deg);
            background-color: #e0f7fa;
        }
        
        .weather-card:hover {
            transform: translateY(-5px);
        }
        
        .weather-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }
        
        .weather-card h2 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .weather-card p {
            color: #666;
            font-size: 16px;
        }
        
        /* 晴天符号 */
        .sun {
            position: relative;
            width: 80px;
            height: 80px;
            background-color: #ffeb3b;
            border-radius: 50%;
            margin: 20px auto;
            box-shadow: 0 0 20px #ffeb3b;
        }
        
        .sun::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 30px;
            width: 10px;
            height: 30px;
            background-color: #ffeb3b;
            border-radius: 5px;
        }
        
        .sun::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 30px;
            width: 10px;
            height: 30px;
            background-color: #ffeb3b;
            border-radius: 5px;
        }
        
        .sun span:nth-child(1) {
            position: absolute;
            left: -15px;
            top: 30px;
            width: 30px;
            height: 10px;
            background-color: #ffeb3b;
            border-radius: 5px;
        }
        
        .sun span:nth-child(2) {
            position: absolute;
            right: -15px;
            top: 30px;
            width: 30px;
            height: 10px;
            background-color: #ffeb3b;
            border-radius: 5px;
        }
        
        .sun span:nth-child(3) {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 20px;
            height: 20px;
            background-color: #ffeb3b;
            transform: rotate(45deg);
        }
        
        .sun span:nth-child(4) {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 20px;
            height: 20px;
            background-color: #ffeb3b;
            transform: rotate(45deg);
        }
        
        .sun span:nth-child(5) {
            position: absolute;
            bottom: -10px;
            left: -10px;
            width: 20px;
            height: 20px;
            background-color: #ffeb3b;
            transform: rotate(45deg);
        }
        
        .sun span:nth-child(6) {
            position: absolute;
            bottom: -10px;
            right: -10px;
            width: 20px;
            height: 20px;
            background-color: #ffeb3b;
            transform: rotate(45deg);
        }
        
        /* 雨天符号 */
        .rain {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 20px auto;
        }
        
        .cloud {
            position: relative;
            width: 60px;
            height: 40px;
            background-color: #9e9e9e;
            border-radius: 20px;
            margin: 0 auto;
        }
        
        .cloud::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 10px;
            width: 30px;
            height: 30px;
            background-color: #9e9e9e;
            border-radius: 50%;
        }
        
        .cloud::after {
            content: '';
            position: absolute;
            top: -10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background-color: #9e9e9e;
            border-radius: 50%;
        }
        
        .raindrop {
            position: absolute;
            bottom: -20px;
            width: 8px;
            height: 15px;
            background-color: #2196f3;
            border-radius: 4px;
            animation: rain 1s infinite linear;
        }
        
        .raindrop:nth-child(2) {
            left: 25px;
            animation-delay: 0.2s;
        }
        
        .raindrop:nth-child(3) {
            left: 40px;
            animation-delay: 0.4s;
        }
        
        .raindrop:nth-child(4) {
            left: 55px;
            animation-delay: 0.6s;
        }
        
        @keyframes rain {
            0% {
                transform: translateY(0) rotate(15deg);
                opacity: 1;
            }
            100% {
                transform: translateY(30px) rotate(15deg);
                opacity: 0;
            }
        }
        
        /* 多云符号 */
        .cloudy {
            position: relative;
            width: 100px;
            height: 60px;
            margin: 20px auto;
        }
        
        .cloudy .cloud {
            width: 80px;
            height: 50px;
            background-color: #bdbdbd;
            border-radius: 25px;
        }
        
        .cloudy .cloud::before {
            top: -20px;
            left: 15px;
            width: 40px;
            height: 40px;
        }
        
        .cloudy .cloud::after {
            top: -15px;
            right: 15px;
            width: 50px;
            height: 50px;
        }
        
        .cloudy .sun-small {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background-color: #ffeb3b;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; margin-bottom: 30px; color: #333;">西安天气预报</h1>
    
    <div class="container">
        <!-- 晴 -->
        <div class="weather-card" id="xian">
            <div class="weather-card-inner">
                <div class="weather-card-front">
                    <h2 onclick="flipCard('xian')">西安天气</h2>
                    <div class="weather-icon" id="weatherIcon">
                        <!-- 图标将动态加载 -->
                    </div>
                    <p id="weatherDesc">加载中...</p>
                    <p id="temperature">温度: --°C</p>
                </div>
                <div class="weather-card-back">
                    <h2>西安天气详情</h2>
                    <p id="humidity">湿度: --%</p>
                    <p id="windSpeed">风速: -- km/h</p>
                    <p id="feelsLike">体感温度: --°C</p>
                    <button onclick="flipCard('xian')">返回</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        function flipCard(cardId) {
            const card = document.getElementById(cardId);
            card.classList.toggle('flipped');
        }

        async function fetchWeather() {
            const weatherDesc = document.getElementById('weatherDesc');
            weatherDesc.textContent = '正在获取天气...';
            try {
                const apiKey = '0d8df58ac126426a949380cba287f26e'; // 已替换为你的和风天气 API key
                const location = '108.95,34.27'; // 西安经纬度
                const response = await fetch(`https://n83wt3ehbm.re.qweatherapi.com/v7/weather/now?key=${apiKey}&location=${location}`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                console.log('Weather data:', data);

                if (data.code !== '200') {
                    throw new Error(`API 返回错误: ${data.code}`);
                }

                const current = data.now;
                const temp = current.temp;
                const desc = current.text;
                const humidity = current.humidity;
                const windSpeed = current.windSpeed;
                const feelsLike = current.feelsLike || temp;

                // 更新正面
                weatherDesc.textContent = desc;
                document.getElementById('temperature').textContent = `温度: ${temp}°C`;

                // 更新背面
                document.getElementById('humidity').textContent = `湿度: ${humidity}%`;
                document.getElementById('windSpeed').textContent = `风速: ${windSpeed} km/h`;
                document.getElementById('feelsLike').textContent = `体感温度: ${feelsLike}°C`;

                // 根据天气描述设置图标
                const iconContainer = document.getElementById('weatherIcon');
                iconContainer.innerHTML = '';
                const descLower = desc.toLowerCase();

                if (descLower.includes('晴') || descLower.includes('sunny') || descLower.includes('clear')) {
                    iconContainer.innerHTML = `
                        <div class="sun">
                            <span></span><span></span><span></span><span></span><span></span><span></span>
                        </div>
                    `;
                } else if (descLower.includes('雨') || descLower.includes('rain')) {
                    iconContainer.innerHTML = `
                        <div class="rain">
                            <div class="cloud"></div>
                            <div class="raindrop"></div>
                            <div class="raindrop"></div>
                            <div class="raindrop"></div>
                        </div>
                    `;
                } else if (descLower.includes('云') || descLower.includes('cloudy')) {
                    iconContainer.innerHTML = `
                        <div class="cloudy">
                            <div class="cloud"></div>
                            <div class="sun-small"></div>
                        </div>
                    `;
                } else {
                    iconContainer.innerHTML = `<p>${desc}</p>`;
                }

            } catch (error) {
                console.error('获取天气数据失败:', error);
                document.getElementById('weatherDesc').textContent = `获取天气失败: ${error.message}`;
            }
        }

        // 页面加载时获取天气
        window.onload = fetchWeather;
    </script>
</body>
</html>
