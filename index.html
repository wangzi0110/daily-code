<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body.dark {
            background-color: #000;
            color: #fff;
        }
        button {
            margin: 16px;
            padding: 8px 16px;
            font-size: 16px;
            border-radius: 10px;
            background-color: deepskyblue;
            border: none;
            color: white;
        }
    </style>
</head>
<body>
    <button id="toggleThemeBtn">切换深色模式</button>
    <h1>hello Github,我要开始学前端啦！</h1>
    <p>这是我在daily-code 仓库里的第一个页面</p>
    <script>
        const button = document.getElementById('toggleThemeBtn');
        button.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            button.textContent = document.body.classList.contains('dark') ? '恢复浅色模式' : '切换深色模式';
        });
    </script>
</body>
</html>
